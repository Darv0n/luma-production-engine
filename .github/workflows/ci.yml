name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # CI build — no API keys needed, just verifies bundle compiles
          ANTHROPIC_API_KEY: placeholder
          LUMA_API_KEY: placeholder

      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/assets/*.js | awk '{print $1}' | head -1)
          echo "Bundle size: $SIZE"
